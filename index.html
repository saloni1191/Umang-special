<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>For Umang ❤️</title>
<style>
:root{--bg1:#fff7f2;--bg2:#ffe8ee;--card:rgba(255,255,255,.76);--ink:#34252a;--muted:#7e646c;--pink:#e96f94;--pink2:#ff9db5;--shadow:0 24px 80px rgba(157,73,96,.20)}
*{box-sizing:border-box}html,body{height:100%;margin:0;font-family:ui-rounded,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--ink);overflow:hidden}body{background:radial-gradient(circle at 18% 12%,#fff 0 8%,transparent 20%),linear-gradient(135deg,var(--bg1),var(--bg2))}
.wrap{height:100%;display:grid;place-items:center;padding:18px;position:relative}.blob{position:absolute;border-radius:999px;filter:blur(18px);opacity:.45;pointer-events:none}.b1{width:210px;height:210px;background:#ffd0dc;left:-70px;top:70px}.b2{width:260px;height:260px;background:#fff1c9;right:-90px;bottom:40px}
.hearts{position:absolute;inset:0;overflow:hidden;pointer-events:none}.heart{position:absolute;color:#ff7f9d;opacity:.42;animation:floatUp linear infinite;font-size:18px}@keyframes floatUp{from{transform:translateY(110vh) rotate(0)}to{transform:translateY(-18vh) rotate(360deg)}}
.card{width:min(430px,94vw);min-height:620px;max-height:92vh;overflow:auto;background:var(--card);border:1px solid rgba(255,255,255,.75);box-shadow:var(--shadow);border-radius:34px;backdrop-filter:blur(18px);padding:24px 22px;position:relative;animation:softIn .55s ease both}@keyframes softIn{from{opacity:0;transform:translateY(18px) scale(.98)}to{opacity:1;transform:none}}
.top{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}.pill{font-size:12px;color:#8d6671;background:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.8);padding:8px 12px;border-radius:999px}.progress{height:9px;border-radius:999px;background:#fff;overflow:hidden;flex:1;box-shadow:inset 0 1px 5px rgba(0,0,0,.05)}.bar{height:100%;width:0%;background:linear-gradient(90deg,var(--pink2),var(--pink));border-radius:999px;transition:width .45s ease}
h1{font-size:36px;line-height:1.05;margin:8px 0 14px;letter-spacing:-1.1px}h2{font-size:27px;line-height:1.14;margin:8px 0 12px;letter-spacing:-.7px}p{font-size:17px;line-height:1.58;color:var(--muted);margin:10px 0}.small{font-size:14px;color:#987984}.center{text-align:center}.emoji{font-size:42px;margin:4px 0;animation:breathe 2.3s ease-in-out infinite}@keyframes breathe{50%{transform:scale(1.08)}}
.stickerRow{display:flex;justify-content:center;gap:10px;margin:8px 0 10px;min-height:52px}.loveSticker{font-size:33px;background:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.9);box-shadow:0 10px 25px rgba(140,70,90,.12);width:54px;height:54px;display:grid;place-items:center;border-radius:20px;animation:stickerFloat 2.5s ease-in-out infinite}.loveSticker:nth-child(2){animation-delay:.25s}.loveSticker:nth-child(3){animation-delay:.5s}@keyframes stickerFloat{50%{transform:translateY(-7px) rotate(3deg)}}
.stickerBubble{position:absolute;right:20px;top:84px;background:#fff;border:1px solid rgba(233,111,148,.16);border-radius:22px;padding:9px 12px;box-shadow:0 12px 32px rgba(140,70,90,.12);font-size:13px;color:#8b6570;max-width:154px;animation:softIn .55s ease both}.stickerBubble:after{content:'';position:absolute;bottom:-7px;right:28px;width:14px;height:14px;background:#fff;transform:rotate(45deg);border-right:1px solid rgba(233,111,148,.12);border-bottom:1px solid rgba(233,111,148,.12)}.miniSticker{position:absolute;font-size:27px;opacity:.88;pointer-events:none;animation:driftSticker 5s ease-in-out infinite}@keyframes driftSticker{50%{transform:translate(8px,-12px) rotate(8deg)}}
.btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;position:relative;min-height:60px}.introBtns{display:flex;justify-content:center;margin-top:24px;min-height:auto}.introBtns button{min-width:210px}button{appearance:none;border:0;cursor:pointer;font-weight:800;font-size:16px;border-radius:20px;padding:15px 18px;transition:.2s ease;font-family:inherit}.primary{background:linear-gradient(135deg,var(--pink),#ff9db5);color:white;box-shadow:0 14px 30px rgba(233,111,148,.32)}.secondary{background:#fff;color:#8a6670;border:1px solid rgba(233,111,148,.18)}button:active{transform:scale(.98)}.secondary.run{position:absolute;width:calc(50% - 6px);right:0;top:0;transition:left .25s ease,top .25s ease,transform .2s ease}
.photoBox{display:none;margin:18px auto 10px;width:100%;border-radius:28px;overflow:hidden;background:#fff;box-shadow:0 18px 45px rgba(86,45,55,.16);transform:scale(.96);opacity:0}.photoBox.show{display:block;animation:photoIn .7s ease forwards}@keyframes photoIn{to{opacity:1;transform:scale(1)}}.photoBox img{width:100%;height:350px;object-fit:cover;display:block}
.revealText{display:none;background:rgba(255,255,255,.68);border:1px solid rgba(255,255,255,.75);padding:16px;border-radius:22px;margin-top:12px;font-size:17px;line-height:1.55;color:#5e424a;white-space:pre-line}.revealText.show{display:block;animation:softIn .55s ease both}.teddy{width:96px;height:96px;margin:4px auto 4px;position:relative}.teddy:before{content:'🐻';font-size:76px;position:absolute;left:9px;top:2px;filter:drop-shadow(0 10px 18px rgba(120,65,70,.15));animation:bounce 2.8s ease-in-out infinite}@keyframes bounce{50%{transform:translateY(-5px)}}
.toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%) translateY(30px);background:#34252a;color:white;padding:12px 16px;border-radius:999px;opacity:0;transition:.3s;z-index:20;font-size:14px;white-space:nowrap}.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.bottomSheet{position:fixed;left:50%;bottom:0;transform:translate(-50%,110%);width:min(430px,94vw);background:linear-gradient(135deg,#fff3f7,#ffd5e2);border:1px solid rgba(255,255,255,.88);box-shadow:0 -20px 70px rgba(157,73,96,.26);border-radius:30px 30px 0 0;padding:20px 18px 22px;z-index:80;text-align:center;transition:transform .38s cubic-bezier(.2,.9,.2,1);color:#5b3843}.bottomSheet.show{transform:translate(-50%,0)}.sheetIcon{font-size:34px;margin-bottom:8px}.sheetTitle{font-weight:900;font-size:19px;margin-bottom:6px}.sheetText{font-size:15px;color:#7b5963;line-height:1.45}.checks{text-align:left;display:grid;gap:11px;margin:18px 0}.check{background:rgba(255,255,255,.66);border:1px solid rgba(255,255,255,.8);padding:13px 14px;border-radius:18px;font-size:15.7px;line-height:1.38}.contractTitle{font-size:25px;font-weight:900;margin-bottom:5px}
.letter{text-align:left;padding:2px 4px;min-height:430px}.typed{font-size:18px;line-height:1.72;color:#5c424a;white-space:pre-line}.cursor{display:inline-block;width:8px;height:20px;background:#e96f94;margin-left:3px;animation:blink .8s infinite}@keyframes blink{50%{opacity:0}}
.slideshow{display:none;margin-top:16px}.slideFrame{border-radius:30px;overflow:hidden;box-shadow:0 22px 55px rgba(90,45,55,.22);background:#fff}.slideFrame img{width:100%;height:420px;object-fit:cover;display:block;animation:fadePic .55s ease both}@keyframes fadePic{from{opacity:.1;transform:scale(1.04)}to{opacity:1;transform:scale(1)}}@keyframes slowZoom{from{transform:scale(1)}to{transform:scale(1.055)}}.slideshow img{animation:fadePic .75s ease both, slowZoom 4.4s ease-in-out forwards}.finalFade{animation:softIn .9s ease both}.caption{font-size:18px;color:#5d4148;margin-top:16px;font-weight:750}.hidden{display:none!important}.spark{position:absolute;inset:auto 18px 18px auto;font-size:24px;opacity:.8}
@media(max-height:720px){.card{min-height:560px}.photoBox img{height:285px}.slideFrame img{height:330px}h1{font-size:30px}h2{font-size:24px}.loveSticker{width:48px;height:48px;font-size:29px}}
</style></head><body><div class="wrap"><div class="blob b1"></div><div class="blob b2"></div><div class="hearts" id="hearts"></div><main class="card" id="card"></main><div class="toast" id="toast"></div><div class="bottomSheet" id="sheet"></div></div>
<script>
const photos=["photo4.webp"];
const screens=[{"type": "intro", "badge": "For the right person only", "title": "Hey Umang...", "text": "Before you continue, I need to make sure this phone is really in the right hands. 👀", "btn": "Let's Begin ✨"}, {"badge": "Identity Verification 🔐", "q": "Who is the most handsome guy in the entire universe?", "yes": "Me 😎", "no": "Someone else", "img": "photo2.jpg", "msg": "Correct! 🤭\nMeet the guy who lives rent-free... in my heart. ❤️", "bubble": "cute sticker approved 🧸"}, {"badge": "Smile Verification 😊", "q": "Who is responsible for fixing my mood in 3 seconds?", "yes": "Me ❤️", "no": "I don't know", "img": "photo3.webp", "msg": "Dekha? Bas ek smile... and my whole mood becomes better. 🥹", "bubble": "smile incoming 💕"}, {"badge": "Breaking News 🚨", "q": "A very handsome boy has been caught stealing one girl's heart. Who is the suspect?", "yes": "Umang", "no": "No idea", "img": "photo1.png", "msg": "Guilty. 😌\nPunishment: lifetime hugs, random kisses, and unlimited love.", "bubble": "hug sticker unlocked 🤗"}, {"badge": "Favourite Person Check 🤍", "q": "Who is my favourite person?", "yes": "You", "no": "Let me think...", "img": "photo4.jpg", "msg": "Better. I was getting worried for a second. 😂\nSach mein, you are my favourite human.", "bubble": "aww moment 🫶"}, {"badge": "Home Location Test 🏡", "q": "What is my favourite place?", "yes": "Next to you", "no": "Anywhere else", "img": "photo5.jpg", "msg": "Home is not a place anymore...\nIt is wherever you are. 🤍", "bubble": "home found 🏡"}, {"badge": "Cute Problem Alert 😌", "q": "Can you stop being this cute?", "yes": "No", "no": "I'll try", "img": "photo6.webp", "msg": "Good. Because honestly... mujhe tum exactly aise hi pasand ho. ❤️", "bubble": "kiss sticker pending 💋"}, {"badge": "Notification Test 📱", "q": "Who is my favourite notification?", "yes": "Umang ❤️", "no": "Low Battery", "img": "photo3.jpg", "msg": "Sorry, nothing beats seeing your name on my screen.\nInstant smile. Every time.", "bubble": "phone smiled 📱"}, {"badge": "Forever Permission 🥺", "q": "Can I keep you forever?", "yes": "Yes", "no": "No", "img": "photo4.webp", "msg": "That is the only correct answer. 😌\nBas aise hi stick with me, okay?", "bubble": "forever approved ❤️"}, {"type": "contract"}, {"type": "letter"}, {"type": "slides"}];
const finalLetter="Dear Umang...\n\nThis was not really a game.\nBecause I already knew every answer.\n\nI just wanted one cute reason to make you smile.\n\nThank you for becoming my comfort, my safe place, my favourite notification, and my biggest happiness.\n\nSach bolu? I don't need everything to be perfect.\nI just want you to stay with me through everything.\n\nKeep annoying me.\nKeep laughing with me.\nKeep making memories with me.\nKeep holding my hand.\n\nBas... stick with me.\nBecause I am not planning to let you go anytime soon.\n\nI love you, Umang.\nMore than you will ever know. ❤️";
const stickerSets=[['🐻','💌','❤️'],['🧸','😘','💕'],['🤗','💗','✨'],['💋','🐻','❤️'],['🫶','🤍','📸'],['🥰','💞','🧸']];
let i=0,noCount=0,slide=0,slideTimer=null,typingTimer=null;const card=document.getElementById('card'),toast=document.getElementById('toast'),sheet=document.getElementById('sheet');
function hearts(){const h=document.getElementById('hearts');for(let j=0;j<18;j++){const s=document.createElement('span');s.className='heart';s.textContent=['♡','♥','❤'][j%3];s.style.left=Math.random()*100+'%';s.style.animationDuration=(8+Math.random()*8)+'s';s.style.animationDelay=(-Math.random()*10)+'s';h.appendChild(s)}}hearts();
function showToast(t){toast.textContent=t;toast.classList.add('show');setTimeout(()=>toast.classList.remove('show'),1400)}
function showSheet(title,text,icon='💗'){sheet.innerHTML=`<div class="sheetIcon">${icon}</div><div class="sheetTitle">${title}</div><div class="sheetText">${text}</div>`;sheet.classList.add('show');setTimeout(()=>sheet.classList.remove('show'),1750)}
function progress(){return Math.min(100,Math.round((i)/(screens.length-1)*100))}
function topBar(badge){return `<div class="top"><span class="pill">${badge||'Little surprise'}</span><div class="progress"><div class="bar" style="width:${progress()}%"></div></div></div>`}
function stickers(seed=0){const set=stickerSets[seed%stickerSets.length];return `<div class="stickerRow"><span class="loveSticker">${set[0]}</span><span class="loveSticker">${set[1]}</span><span class="loveSticker">${set[2]}</span></div>`}
function bubble(txt){return `<div class="stickerBubble">${txt}</div>`}
function addMiniStickers(){['💋','🤗','🧸'].forEach((x,k)=>{const e=document.createElement('span');e.className='miniSticker';e.textContent=x;e.style.left=(18+k*28)+'px';e.style.bottom=(50+k*48)+'px';e.style.animationDelay=(k*.4)+'s';card.appendChild(e)})}
function render(){clearTimeout(typingTimer);document.querySelectorAll('.miniSticker').forEach(x=>x.remove());noCount=0;const s=screens[i];card.scrollTop=0;card.style.animation='none';card.offsetHeight;card.style.animation='softIn .55s ease both';if(s.type==='intro')return renderIntro(s);if(s.type==='contract')return renderContract();if(s.type==='letter')return renderLetter();if(s.type==='slides')return renderSlides();renderQuestion(s)}
function renderIntro(s){card.innerHTML=`${topBar(s.badge)}<div class="center"><div class="teddy"></div>${stickers(0)}<h1>${s.title}</h1><p>${s.text}</p><p class="small">No cheating. Only honest answers allowed. 🤭</p><div class="introBtns"><button class="primary" onclick="next()">${s.btn}</button></div></div>${bubble('little surprise loading...')}<span class="spark">✨</span>`;addMiniStickers()}
function renderQuestion(s){card.innerHTML=`${topBar(s.badge)}<div class="center"><div class="emoji">${i%2?'❤️':'🤍'}</div>${stickers(i)}<h2>${s.q}</h2><div class="btns" id="btns"><button class="primary" onclick="answer()">${s.yes}</button><button class="secondary run" id="noBtn" onmouseenter="runNo()" onclick="runNo(event)">${s.no}</button></div><div class="photoBox" id="photo"><img src="${s.img}" alt="memory photo"></div><div class="revealText" id="msg"></div><button class="primary hidden" id="nextBtn" style="width:100%;margin-top:16px" onclick="next()">Next ➜</button></div>${bubble(s.bubble||'cute moment 💕')}`;addMiniStickers()}
function answer(){const s=screens[i];document.getElementById('btns').classList.add('hidden');const p=document.getElementById('photo'),m=document.getElementById('msg'),n=document.getElementById('nextBtn');p.classList.add('show');setTimeout(()=>{m.textContent=s.msg;m.classList.add('show')},650);setTimeout(()=>{n.classList.remove('hidden')},2100)}
function runNo(e){if(e)e.preventDefault();noCount++;const b=document.getElementById('noBtn'),area=document.getElementById('btns');if(!b||!area)return;const msgs=[['Nice try 😌','Correct answer upar hai, mister. ❤️','💗'],['Wrong direction 😂','Dil ka answer choose karo... no cheating.','🤭'],['This option is unavailable','No button aaj pink vacation par hai.','🌸'],['Arre... try again','I know you know the right answer.','💕'],['Nope 😂','Ye option tumhare liye allowed nahi hai.','🧸']];const m=msgs[(noCount-1)%msgs.length];showSheet(m[0],m[1],m[2]);const maxX=Math.max(10,area.clientWidth-b.clientWidth-8),maxY=110;b.style.left=(Math.random()*maxX)+'px';b.style.top=(45+Math.random()*maxY)+'px';if(noCount>4){b.style.transform='scale(.75) rotate(-5deg)';b.textContent='Nope 😂'}}
function renderContract(){card.innerHTML=`${topBar('Tiny Relationship Agreement 😌')}<div class="center"><div class="emoji">📜</div>${stickers(3)}<div class="contractTitle">Tiny Relationship Agreement</div><p>Before the final surprise... ek chhota sa agreement sign karna padega. 🤭</p><div class="checks"><div class="check">☑️ Roz at least <b>1 “I love you”</b> mandatory. ❤️</div><div class="check">☑️ Meri bakwaas stories poori sunni padegi... bina complain kiye. 😂</div><div class="check">☑️ Jab main bolu <b>“I’m fine”</b>, samajh jaana I’m definitely not fine. 😌</div><div class="check">☑️ Har fight ke baad <b>first hug compulsory</b>. 🤍</div><div class="check">☑️ Coffee dates, ice cream plans aur random photos — mana nahi karna. 📸</div><div class="check">☑️ Mujhe aise hi tang bhi karna hai... aur aise hi pyaar bhi. ❤️</div><div class="check">☑️ Sabse important: <b>mera haath kabhi mat chhodna, okay?</b> 🥺</div></div><button class="primary" style="width:100%" onclick="contractDone()">I Agree (waise bhi option nahi hai 😌)</button></div>${bubble('sign karo mister 😌')}`;addMiniStickers()}
function contractDone(){showToast('Agreement accepted successfully ❤️');setTimeout(next,1100)}
function renderLetter(){card.innerHTML=`${topBar('Secret Message Unlocked 💌')}<div class="letter">${stickers(4)}<h2>One little message...</h2><div class="typed" id="typed"></div><span class="cursor" id="cursor"></span><button class="primary hidden" id="lastSurpriseBtn" style="width:100%;margin-top:20px" onclick="next()">✨ One Last Surprise</button></div>`;typeText(finalLetter,document.getElementById('typed'),()=>{setTimeout(()=>{document.getElementById('lastSurpriseBtn').classList.remove('hidden')},700)});addMiniStickers()}
function typeText(txt,el,done){let k=0;function t(){el.textContent=txt.slice(0,k++);if(k<=txt.length)typingTimer=setTimeout(t,26);else{document.getElementById('cursor').style.display='none';setTimeout(done,450)}}t()}
function renderSlides(){slide=0;clearTimeout(slideTimer);card.innerHTML=`${topBar('Our Little Memories 📸')}<div class="center finalFade">${stickers(5)}<h2>One last thing...</h2><p>Every picture has a memory. Aur har memory mein tum ho. ❤️</p><div class="slideshow" style="display:block"><div class="slideFrame"><img id="slideImg" src="${photos[0]}"></div><div class="caption" id="cap">${caps[0]}</div></div></div>`;addMiniStickers();slideTimer=setTimeout(nextMemory,5600)}
const caps=['My favourite mirror selfie... because it has us. 🤍','This smile? Instant mood fixer. 🥹','One forehead kiss = whole day happiness. ❤️','This one is soft, warm, and so us.','Still wondering how one person can look this handsome. 😌','Couple goals? I think yes.'];
function nextMemory(){slide++;if(slide>=photos.length){showFinalFrame();return}const img=document.getElementById('slideImg'),cap=document.getElementById('cap');if(!img)return;img.style.opacity='0';img.style.transform='scale(1.04)';setTimeout(()=>{img.src=photos[slide];cap.textContent=caps[slide%caps.length];img.style.animation='none';img.offsetHeight;img.style.animation='fadePic .75s ease both, slowZoom 4.4s ease-in-out forwards'},280);slideTimer=setTimeout(nextMemory,5600)}
function autoSlide(){nextMemory()}
function showFinalFrame(){card.innerHTML=`${topBar('Forever ❤️')}<div class="center" style="padding-top:44px"><div class="emoji">❤️</div>${stickers(2)}<h1>Forever?</h1><p style="font-size:24px;color:#5d4148;font-weight:900">Always.</p><p>I'll choose you.<br>Again. Again. And again.</p><h2 style="margin-top:28px">Love you, Umang ❤️</h2><p class="small">— Saloni 🤍</p></div>`;addMiniStickers();confetti()}
function confetti(){showToast('Virtual hug sent 🤗❤️');for(let c=0;c<38;c++){const e=document.createElement('span');e.textContent=['❤️','✨','🤍','🎉','💋','🤗'][c%6];e.style.position='fixed';e.style.left=Math.random()*100+'vw';e.style.top='-20px';e.style.fontSize=(18+Math.random()*14)+'px';e.style.zIndex=50;e.style.transition='transform 2.2s ease, opacity 2.2s ease';document.body.appendChild(e);setTimeout(()=>{e.style.transform=`translateY(${95+Math.random()*20}vh) rotate(${Math.random()*360}deg)`;e.style.opacity='0'},20);setTimeout(()=>e.remove(),2400)}}
function next(){if(i<screens.length-1){i++;render()}}
render();
</script></body></html>
